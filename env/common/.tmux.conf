# Enable colored vim
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Change copy mode key bindings like vi
set-window-option -g mode-keys vi

# Status line
set -g status-justify "centre"

set -g status-bg "colour238"
set -g status-fg "colour244"

set -g status-left "#[default] [#S] #[default]"
set -g status-right "#[default] %m/%d %H:%M:%S #[default]"

set-window-option -g window-status-current-format "#[fg=colour251] #I:#W* #[default]"

# Toggle remote mode with Ctrl+a (local only)
# Ctrl+a disables local tmux so Ctrl+b reaches remote tmux
# Press Ctrl+a again to re-enable local tmux
if-shell 'test -z "$SSH_CLIENT" -a -z "$SSH_CONNECTION"' {
    bind -T root C-a \
        set prefix None \;\
        set key-table off \;\
        set status-style "bg=colour52,fg=colour246" \;\
        refresh-client -S

    bind -T off C-a \
        set -u prefix \;\
        set -u key-table \;\
        set -u status-style \;\
        refresh-client -S
}
