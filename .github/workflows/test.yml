name: BATS Tests

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install BATS and jq
        run: sudo apt-get update && sudo apt-get install -y bats jq
      - name: Run BATS tests
        env:
          TERM: xterm
        run: bats --formatter pretty --recursive test
